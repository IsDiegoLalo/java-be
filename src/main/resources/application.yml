server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: content-publishing-platform

  # PostgreSQL configuration
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/content_platform}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # MongoDB configuration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/content_analytics}

  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      group-id: content-platform

  # Jackson serialization
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: always
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat
    time-zone: UTC

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
# Docker profile - used when running inside Docker Compose
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/content_platform
    username: postgres
    password: postgres

  data:
    mongodb:
      uri: mongodb://mongodb:27017/content_analytics

  kafka:
    bootstrap-servers: kafka:9092

management:
  endpoint:
    health:
      show-details: always

---
# Test profile - used for integration and unit tests
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16:///content_platform_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    show-sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/content_analytics_test

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 0
