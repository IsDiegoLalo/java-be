spring:
  # Testcontainers will dynamically provide connection URLs
  # These properties are overridden by @DynamicPropertySource in integration tests
  datasource:
    url: jdbc:tc:postgresql:16:///content_platform_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://localhost:27017/content_analytics_test

  kafka:
    bootstrap-servers: localhost:9092

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: always
    time-zone: UTC

server:
  port: 0
