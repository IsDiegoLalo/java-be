name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run unit and property-based tests
        run: ./gradlew test --no-daemon

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

      - name: Publish test failure summary
        if: failure()
        run: |
          echo "## Test Failure Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "build/reports/tests/test" ]; then
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            find build/reports/tests/test -name "*.xml" -path "*/TEST-*.xml" | while read file; do
              grep -l 'failures="[1-9]\|errors="[1-9]' "$file" 2>/dev/null | while read failed; do
                echo "- $(basename "$failed" .xml | sed 's/TEST-//')" >> $GITHUB_STEP_SUMMARY
              done
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See uploaded test-reports artifact for full details." >> $GITHUB_STEP_SUMMARY
